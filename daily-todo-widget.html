<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Todo List Widget</title>
  <style>
    :root {
      --grid: #cfd6de;
      --header: #5f9adb;
      --text: #1d242d;
      --soft-green: #d8f2c8;
      --ring-track: #eef3f7;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 64px 32px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .widget {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--grid);
      box-shadow: 0 10px 28px rgba(41, 55, 73, 0.08);
    }

    .title {
      margin: 0;
      padding: 14px 18px;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      background: var(--header);
      text-transform: none;
    }

    .board {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(240px, 1.1fr);
      min-height: 560px;
    }

    .table-wrap {
      border-right: 1px solid var(--grid);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid var(--grid);
      height: 38px;
      padding: 6px 8px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 400;
    }

    th:nth-child(1), td:nth-child(1) {
      width: 68px;
    }

    th:nth-child(2), td:nth-child(2) {
      width: 64px;
    }

    th:nth-child(3), td:nth-child(3) {
      width: auto;
    }

    td.task-cell {
      padding: 0;
    }

    .task-input {
      width: 100%;
      height: 100%;
      border: 0;
      padding: 8px 10px;
      text-align: center;
      font: inherit;
      color: inherit;
      background: transparent;
    }

    .task-input.is-done {
      text-decoration: line-through;
      color: #7c8794;
    }

    .task-input:focus {
      outline: 2px solid rgba(95, 154, 219, 0.28);
      outline-offset: -2px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7fc56f;
      cursor: pointer;
    }

    .status-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100%;
    }

    .status-heading {
      border-bottom: 1px solid var(--grid);
      height: 38px;
      display: grid;
      place-items: center;
      font-size: 0.95rem;
    }

    .ring-wrap {
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .ring-card {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .ring {
      --progress: 0;
      width: 168px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fff 0 16%, transparent 16%),
        conic-gradient(#bfe8a8 calc(var(--progress) * 1%), var(--ring-track) 0);
      position: relative;
      display: grid;
      place-items: center;
    }

    .ring::after {
      content: "";
      width: 106px;
      height: 106px;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(207, 214, 222, 0.6);
    }

    .ring-value {
      position: absolute;
      font-size: 1.25rem;
      font-weight: 700;
      z-index: 1;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--grid);
    }

    .summary-box {
      border-left: 1px solid var(--grid);
      min-height: 72px;
      display: grid;
      place-items: center;
      padding: 8px 12px;
      text-align: center;
    }

    .summary-box:first-child {
      border-left: 0;
    }

    .summary-label {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .summary-value {
      font-size: 1.05rem;
    }

    @media (max-width: 760px) {
      .title {
        font-size: 1.55rem;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .table-wrap {
        border-right: 0;
      }

      .status-panel {
        border-top: 1px solid var(--grid);
      }
    }
  </style>
</head>
<body>
  <section class="widget" aria-label="Daily todo list widget">
    <h1 class="title">Daily to do list</h1>

    <div class="board">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Check</th>
              <th>No.</th>
              <th>Task</th>
            </tr>
          </thead>
          <tbody id="todo-body"></tbody>
        </table>
      </div>

      <aside class="status-panel">
        <div class="status-heading">Status</div>

        <div class="ring-wrap">
          <div class="ring-card">
            <div class="ring" id="progress-ring" aria-label="Completion status">
              <div class="ring-value" id="progress-value">0%</div>
            </div>
          </div>
        </div>

        <div class="summary">
          <div class="summary-box">
            <div class="summary-label">Completed</div>
            <div class="summary-value" id="completed-value">0%</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Missing</div>
            <div class="summary-value" id="missing-value">100%</div>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <script>
    const tasks = [
      "See a doctor",
      "PPT draft",
      "Snowflake video",
      "Apply 10 position",
      "PPT skills install",
      "",
      "",
      "",
      "",
      "",
      "",
      ""
    ];

    const todoBody = document.getElementById("todo-body");
    const progressRing = document.getElementById("progress-ring");
    const progressValue = document.getElementById("progress-value");
    const completedValue = document.getElementById("completed-value");
    const missingValue = document.getElementById("missing-value");

    function renderRows() {
      tasks.forEach((task, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input type="checkbox" class="task-check" aria-label="Mark task ${index + 1} complete"></td>
          <td class="task-number"></td>
          <td class="task-cell">
            <input class="task-input" type="text" value="${task}" placeholder="Add task">
          </td>
        `;
        todoBody.appendChild(row);
      });
    }

    function syncRows() {
      const rows = [...todoBody.querySelectorAll("tr")];
      let visibleNumber = 0;

      rows.forEach((row) => {
        const checkbox = row.querySelector(".task-check");
        const input = row.querySelector(".task-input");
        const numberCell = row.querySelector(".task-number");
        const hasTask = input.value.trim() !== "";

        if (hasTask) {
          visibleNumber += 1;
          numberCell.textContent = `No.${visibleNumber}`;
        } else {
          numberCell.textContent = "";
          checkbox.checked = false;
        }

        input.classList.toggle("is-done", checkbox.checked && hasTask);
      });
    }

    function updateProgress() {
      syncRows();

      const rows = [...todoBody.querySelectorAll("tr")];
      const activeRows = rows.filter((row) => row.querySelector(".task-input").value.trim() !== "");
      const completed = activeRows.filter((row) => row.querySelector(".task-check").checked).length;
      const total = activeRows.length || 1;
      const percent = Math.round((completed / total) * 100);
      const missing = 100 - percent;

      progressRing.style.setProperty("--progress", percent);
      progressValue.textContent = `${percent}%`;
      completedValue.textContent = `${percent}%`;
      missingValue.textContent = `${missing}%`;
    }

    renderRows();
    updateProgress();

    todoBody.addEventListener("change", (event) => {
      if (event.target.matches(".task-check")) {
        updateProgress();
      }
    });

    todoBody.addEventListener("input", (event) => {
      if (event.target.matches(".task-input")) {
        updateProgress();
      }
    });
  </script>
</body>
</html>
